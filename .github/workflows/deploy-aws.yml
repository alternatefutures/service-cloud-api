name: Deploy to AWS (K3s)

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "prisma/**"
      - "package.json"
      - "pnpm-lock.yaml"
      - "Dockerfile"
      - "docker-entrypoint.sh"
  workflow_dispatch:

concurrency:
  group: deploy-aws-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout into service-cloud-api subdirectory
        uses: actions/checkout@v4
        with:
          path: service-cloud-api

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: service-cloud-api/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

      - name: Set up kubectl
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Run Prisma migrations (before traffic shift)
        run: |
          DB_URL=$(kubectl get secret database-credentials -n af-production \
            -o jsonpath='{.data.API_DATABASE_URL}' | base64 -d)
          kubectl run prisma-migrate-${GITHUB_SHA::7} \
            --image=${{ env.IMAGE }}:${{ github.sha }} \
            --restart=Never --rm -i \
            --overrides='{"spec":{"imagePullSecrets":[{"name":"ghcr-credentials"}]}}' \
            --env="DATABASE_URL=${DB_URL}" \
            -n af-production \
            --command -- npx prisma migrate deploy

      - name: Deploy to K3s
        run: |
          kubectl set image deployment/service-cloud-api \
            service-cloud-api=${{ env.IMAGE }}:${{ github.sha }} \
            -n af-production
          kubectl rollout status deployment/service-cloud-api \
            -n af-production --timeout=180s

      - name: Verify deployment
        id: verify
        run: |
          kubectl get pods -n af-production -l app=service-cloud-api
          echo "---"
          sleep 10
          if curl -sf --max-time 15 https://api.alternatefutures.ai/health; then
            echo "API healthy"
            echo "healthy=true" >> $GITHUB_OUTPUT
          else
            echo "::error::Post-deploy health check failed for service-cloud-api"
            echo "healthy=false" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Discord notification (success)
        if: success()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"✅ service-cloud-api deployed\",
              \"description\": \"Commit: \`${GITHUB_SHA::7}\`\nHealth: ${{ steps.verify.outputs.healthy == 'true' && 'passing' || 'pending' }}\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"color\": 3066993,
              \"footer\": {\"text\": \"AlternateFutures Deploy\"},
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK_URL"

      - name: Discord notification (failure)
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          [ -z "$DISCORD_WEBHOOK_URL" ] && exit 0
          curl -sf -H "Content-Type: application/json" -d "{
            \"embeds\": [{
              \"title\": \"❌ service-cloud-api deploy FAILED\",
              \"description\": \"Commit: \`${GITHUB_SHA::7}\`\n[View run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})\",
              \"color\": 15548997,
              \"footer\": {\"text\": \"AlternateFutures Deploy\"},
              \"timestamp\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }]
          }" "$DISCORD_WEBHOOK_URL"
