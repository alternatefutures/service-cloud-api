name: Copy AKASH_MNEMONIC to marketing-admin

on:
  workflow_dispatch:

jobs:
  copy-secret:
    runs-on: ubuntu-latest
    steps:
      - name: Install tweetsodium
        run: npm install tweetsodium

      - name: Copy AKASH_MNEMONIC to marketing-admin
        env:
          AKASH_MNEMONIC: ${{ secrets.AKASH_MNEMONIC }}
          ADMIN_PAT: ${{ secrets.ADMIN_PAT }}
        run: |
          node << 'JSEOF'
          const sodium = require('./node_modules/tweetsodium');
          const https = require('https');

          const token = process.env.ADMIN_PAT;
          const mnemonic = process.env.AKASH_MNEMONIC;

          function apiRequest(method, path, body) {
            return new Promise((resolve, reject) => {
              const opts = {
                hostname: 'api.github.com',
                path,
                method,
                headers: {
                  'Authorization': `token ${token}`,
                  'Accept': 'application/vnd.github.v3+json',
                  'User-Agent': 'marketing-admin-deploy',
                  'Content-Type': 'application/json',
                }
              };
              const req = https.request(opts, res => {
                let data = '';
                res.on('data', d => data += d);
                res.on('end', () => resolve({ status: res.statusCode, body: data ? JSON.parse(data) : {} }));
              });
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          async function main() {
            // Get public key for marketing-admin
            const pkRes = await apiRequest('GET', '/repos/alternatefutures/marketing-admin/actions/secrets/public-key');
            console.log('Public key status:', pkRes.status);
            const { key, key_id } = pkRes.body;

            // Encrypt the mnemonic
            const keyBytes = Buffer.from(key, 'base64');
            const secretBytes = Buffer.from(mnemonic);
            const encrypted = sodium.seal(secretBytes, keyBytes);
            const encryptedValue = Buffer.from(encrypted).toString('base64');

            // Set the secret
            const setRes = await apiRequest('PUT', '/repos/alternatefutures/marketing-admin/actions/secrets/AKASH_MNEMONIC', {
              encrypted_value: encryptedValue,
              key_id
            });
            console.log('Set secret status:', setRes.status);
            if (setRes.status === 201 || setRes.status === 204) {
              console.log('✅ AKASH_MNEMONIC successfully copied to marketing-admin');
            } else {
              console.error('❌ Failed:', JSON.stringify(setRes.body));
              process.exit(1);
            }
          }
          main().catch(e => { console.error(e); process.exit(1); });
          JSEOF
